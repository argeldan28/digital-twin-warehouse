services:
  database:
    image: postgres:15-alpine
    container_name: warehouse_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: warehouse_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d warehouse_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: warehouse_backend
    ports:
      - "8080:8080"
    environment:
      # Override the Spring Datasource URL to point to the docker container alias
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/warehouse_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: warehouse_frontend
    ports:
      - "5173:80" # Maps host port 5173 to nginx server port 80
    depends_on:
      - backend

volumes:
  postgres_data:
